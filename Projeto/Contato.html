    <main>
        <form action="contato.php" method="post">
            <h2>Contato</h2>
        <div class="campo">
            <span class="material-symbols-outlined">contacts_product</span>
            <input type="text" name="nome" placeholder="Nome*" required>
        </div>
        <div class="campo">
            <span class="material-symbols-outlined">mail</span>
            <input type="email" name="email" placeholder="E-mail*" required>
        </div>
        <div class="campo">
            <span class="material-symbols-outlined">call</span>
            <input type="tel" name="tel" placeholder="Telefone*" required>
        </div>
        <h3>AVALIE NOSSO SITE</h3>
        <div class="campo">
            <p style="margin-right: 4px;">0</p>
            <input type="range" min="0" max="10" name="satisfacaoCliente" id="satisfacaoCliente">
            <p style="margin-left: 4px;">10</p>
        </div>
        <textarea name="msg" id="msg" cols="30" rows="10" placeholder="Mensagem"></textarea>
        <button type="submit">Enviar</button>
        </form>
