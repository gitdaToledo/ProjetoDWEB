<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilos/responsividadeIndex.css">
    <title>Projeto DWEB - Jogos Indie</title>

<style> 

@import url('https://fonts.googleapis.com/css2?family=Jersey+20&display=swap');

 /*mobile first*/
    
    body{
        background-color: #12022b;
        background-image: url(Imagens-dinamicas/backgroundIndex-celular.png);
        background-size: 100vw 100vh;
        padding-top: 30vh;
    }

    h1{
        text-align: center;
        font-family: "Jersey 20", sans-serif;
        color: white;
        font-size: 6.5em;
        text-shadow: 3px 4px 1px #ff0068;
        margin: 0;
    }

     .titulo{
        display: flex;
        flex-direction: column;
        align-items: center;
        line-height: 80px;
    }

    div#menu{
        color: white;
        text-align: center;
        font-family: "Jersey 20", sans-serif;
        width: 30vw;
        padding: 3px;
        margin-top: 1.5vh;
        margin: auto;
    }



/*animação setas menu*/

    #menu h2::after, #menu h2::before{
        opacity: 0;
        transition: 0.3s;
    }

    #menu h2::before {
    content: "> ";
    }

    #menu h2::after {
        content: " <";
    }

    #menu h2:active::before,
    #menu h2:active::after {
        opacity: 1;
    }

    h2{
        margin: 0;
        font-size: 2rem;
        text-align: center;
    }

    #botaoStart{
        display: flex;
        margin: auto;
        margin-top: 1.5vh;
        width: 40vw;
    }

</style>

</head>
<body>

   <div class="titulo">
       <h1>JOGOS</h1>
       <h1>INDIE</h1>
   </div>

   <a href="#"><img id="botaoStart" src="itensPng/botaoStart.png" alt="Botão de Start"></a>

    <div id="menu">
       <h2>MENU</h2> 
    </div>
   
    
</body>
</html>
